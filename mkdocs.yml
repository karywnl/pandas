site_name: Pandas
site_description: A beginner-first, visual, deeply connected guide to pandas.
site_author: kary
site_url: https://karywnl.github.io/pandas/
copyright: Written for pandas 3.0.3 &middot; last reviewed June 2026

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - path: javascripts/a11y.js
    defer: true

nav:
  - Home: index.md
  - Foundations:
      - Series: foundations/series.md
      - Building a DataFrame: foundations/dataframe.md
      - Reading and writing data: foundations/reading-data.md
      - Inspecting a DataFrame: foundations/attributes.md
      - Data types: foundations/dtypes.md
      - head and tail: foundations/head-tail.md
  - Selecting data:
      - Selecting columns: selection/column-selection.md
      - Selecting multiple columns: selection/multi-column.md
      - loc and iloc: selection/loc-iloc.md
      - Boolean indexing: selection/boolean-indexing.md
      - Sorting: selection/sorting.md
  - The index:
      - Setting the index: indexing/set-index.md
      - Resetting the index: indexing/reset-index.md
  - Cleaning data:
      - Missing values: cleaning/missing-values.md
      - Dropping duplicates: cleaning/duplicates.md
      - Renaming columns: cleaning/rename.md
      - Replacing values: cleaning/replace.md
      - String methods: cleaning/strings.md
      - Changing data types: cleaning/change-dtypes.md
  - Grouping and reshaping:
      - GroupBy: grouping/groupby.md
      - Aggregation: grouping/aggregation.md
      - Multi-level GroupBy: grouping/multi-level-groupby.md
      - Pivot tables: grouping/pivot.md
      - Cross tabulation: grouping/crosstab.md
      - Melt (wide to long): grouping/melt.md
      - Unstack (long to wide): grouping/unstack.md
  - Combining data:
      - Merge DataFrames: combining/merge.md
      - Concatenate DataFrames: combining/concat.md
  - Transforming data:
      - Apply custom functions: transforming/apply.md
  - Dates and times:
      - Datetime and the .dt accessor: dates/datetime.md
